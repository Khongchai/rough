<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, minimum-scale=1, initial-scale=1, user-scalable=yes"
    />
    <title>RoughJS Ellipse Perf: JS vs Rust/WASM</title>
    <style>
      html {
        background: black;
      }
      body {
        font-family: monospace;
        background: black;
        color: white;
      }
      #results {
        white-space: pre;
        margin-bottom: 12px;
        line-height: 1.4;
      }
    </style>
  </head>

  <body>
    <div id="results">Loading WASM…</div>
    <canvas width="800" height="800"></canvas>

    <script type="module">
      import rough from "../../bundled/rough.esm.js";
      import init, {
        generate_ellipses,
        generate_ellipses_view,
        bench_ellipses,
      } from "./rough-wasm/pkg/rough_wasm.js";

      const COUNT = 6000;
      const RUNS = 10;
      const WIDTH = 800;
      const HEIGHT = 800;
      const SEED = 1; // all use the seeded Park-Miller LCG

      const canvas = document.querySelector("canvas");
      const ctx = canvas.getContext("2d");
      const rc = rough.canvas(canvas);
      const results = document.getElementById("results");

      // Default RoughJS option values the ellipse stroke path reads.
      const ROUGHNESS = 1;
      const MAX_RAND = 2;
      const BOWING = 1;
      const PRESERVE_VERTICES = false;
      const DISABLE_MULTI_STROKE = false;
      const CURVE_STEP_COUNT = 9;
      const CURVE_FITTING = 0.95;
      const CURVE_TIGHTNESS = 0;

      // Upper bound on ops/ellipse for the preallocated JS flat buffer (~30 typical).
      const MAX_OPS_PER_ELLIPSE = 64;

      const avg = (arr) => arr.reduce((a, b) => a + b, 0) / arr.length;

      // Op buffer encoding (must match rough-wasm/src/lib.rs).
      const OP_STRIDE = 7;
      const OP_MOVE = 0;
      const OP_BCURVE = 1;
      const OP_LINE = 2;
      const STROKE_WIDTH = 1;

      function drawOpBuffer(ctx, buf, len) {
        ctx.clearRect(0, 0, WIDTH, HEIGHT);
        ctx.save();
        ctx.strokeStyle = "white";
        ctx.lineWidth = STROKE_WIDTH;
        ctx.beginPath();
        const n = len === undefined ? buf.length : len;
        for (let i = 0; i < n; i += OP_STRIDE) {
          const op = buf[i];
          if (op === OP_MOVE) {
            ctx.moveTo(buf[i + 1], buf[i + 2]);
          } else if (op === OP_BCURVE) {
            ctx.bezierCurveTo(
              buf[i + 1],
              buf[i + 2],
              buf[i + 3],
              buf[i + 4],
              buf[i + 5],
              buf[i + 6]
            );
          } else if (op === OP_LINE) {
            ctx.lineTo(buf[i + 1], buf[i + 2]);
          }
        }
        ctx.stroke();
        ctx.restore();
      }

      // Park-Miller LCG, identical to src/math.ts and the Rust port.
      class FlatRandom {
        constructor(seed) {
          this.seed = seed;
        }
        next() {
          this.seed = Math.imul(48271, this.seed);
          return (this.seed & 0x7fffffff) / 2147483648;
        }
      }

      // Pure-JS baseline: same ellipse algorithm as rough.js, but emits ops into a
      // preallocated flat Float64Array (stride 7) with no Op object graph. The points
      // arrays are kept (rough.js and the Rust port both build them) so this isolates
      // the op-object overhead specifically. Mirrors rough-wasm/src/lib.rs. Returns the
      // number of floats written.
      function genFlatJSEllipse(ellipses, buf, o, seed) {
        const rng = new FlatRandom(seed);
        const count = ellipses.length / 4;
        let p = 0;

        const offset = (min, max) =>
          o.roughness * (rng.next() * (max - min) + min); // ellipse always uses gain=1
        const offsetOpt = (x) => offset(-x, x);

        function emitMove(x, y) {
          buf[p] = OP_MOVE;
          buf[p + 1] = x;
          buf[p + 2] = y;
          buf[p + 3] = 0;
          buf[p + 4] = 0;
          buf[p + 5] = 0;
          buf[p + 6] = 0;
          p += 7;
        }
        function emitBcurve(c1x, c1y, c2x, c2y, ex, ey) {
          buf[p] = OP_BCURVE;
          buf[p + 1] = c1x;
          buf[p + 2] = c1y;
          buf[p + 3] = c2x;
          buf[p + 4] = c2y;
          buf[p + 5] = ex;
          buf[p + 6] = ey;
          p += 7;
        }

        function ellipseParams(width, height) {
          const psq = Math.sqrt(
            Math.PI *
              2 *
              Math.sqrt(((width / 2) ** 2 + (height / 2) ** 2) / 2)
          );
          const stepCount = Math.ceil(
            Math.max(o.curveStepCount, (o.curveStepCount / Math.sqrt(200)) * psq)
          );
          const increment = (Math.PI * 2) / stepCount;
          let rx = Math.abs(width / 2);
          let ry = Math.abs(height / 2);
          const cfr = 1 - o.curveFitting;
          rx += offsetOpt(rx * cfr);
          ry += offsetOpt(ry * cfr);
          return { increment, rx, ry };
        }

        function computeEllipsePoints(increment, cx, cy, rx, ry, off, overlap) {
          const all = [];
          if (o.roughness === 0) {
            const inc = increment / 4;
            all.push([cx + rx * Math.cos(-inc), cy + ry * Math.sin(-inc)]);
            for (let a = 0; a <= Math.PI * 2; a += inc) {
              all.push([cx + rx * Math.cos(a), cy + ry * Math.sin(a)]);
            }
            all.push([cx + rx, cy]);
            all.push([cx + rx * Math.cos(inc), cy + ry * Math.sin(inc)]);
          } else {
            const radOffset = offsetOpt(0.5) - Math.PI / 2;
            all.push([
              offsetOpt(off) + cx + 0.9 * rx * Math.cos(radOffset - increment),
              offsetOpt(off) + cy + 0.9 * ry * Math.sin(radOffset - increment),
            ]);
            const endAngle = Math.PI * 2 + radOffset - 0.01;
            for (let a = radOffset; a < endAngle; a += increment) {
              all.push([
                offsetOpt(off) + cx + rx * Math.cos(a),
                offsetOpt(off) + cy + ry * Math.sin(a),
              ]);
            }
            all.push([
              offsetOpt(off) + cx + rx * Math.cos(radOffset + Math.PI * 2 + overlap * 0.5),
              offsetOpt(off) + cy + ry * Math.sin(radOffset + Math.PI * 2 + overlap * 0.5),
            ]);
            all.push([
              offsetOpt(off) + cx + 0.98 * rx * Math.cos(radOffset + overlap),
              offsetOpt(off) + cy + 0.98 * ry * Math.sin(radOffset + overlap),
            ]);
            all.push([
              offsetOpt(off) + cx + 0.9 * rx * Math.cos(radOffset + overlap * 0.5),
              offsetOpt(off) + cy + 0.9 * ry * Math.sin(radOffset + overlap * 0.5),
            ]);
          }
          return all;
        }

        function curve(points) {
          const len = points.length;
          if (len > 3) {
            const s = 1 - o.curveTightness;
            emitMove(points[1][0], points[1][1]);
            for (let i = 1; i + 2 < len; i++) {
              const b1x = points[i][0] + (s * points[i + 1][0] - s * points[i - 1][0]) / 6;
              const b1y = points[i][1] + (s * points[i + 1][1] - s * points[i - 1][1]) / 6;
              const b2x = points[i + 1][0] + (s * points[i][0] - s * points[i + 2][0]) / 6;
              const b2y = points[i + 1][1] + (s * points[i][1] - s * points[i + 2][1]) / 6;
              emitBcurve(b1x, b1y, b2x, b2y, points[i + 1][0], points[i + 1][1]);
            }
          } else if (len === 3) {
            emitMove(points[1][0], points[1][1]);
            emitBcurve(
              points[1][0],
              points[1][1],
              points[2][0],
              points[2][1],
              points[2][0],
              points[2][1]
            );
          }
        }

        function ellipseInto(x, y, params) {
          const inner = offset(0.4, 1);
          const overlap = params.increment * offset(0.1, inner);
          const ap1 = computeEllipsePoints(
            params.increment,
            x,
            y,
            params.rx,
            params.ry,
            1,
            overlap
          );
          curve(ap1);
          if (!o.disableMultiStroke && o.roughness !== 0) {
            const ap2 = computeEllipsePoints(
              params.increment,
              x,
              y,
              params.rx,
              params.ry,
              1.5,
              0
            );
            curve(ap2);
          }
        }

        for (let i = 0; i < count; i++) {
          const b = i * 4;
          const params = ellipseParams(ellipses[b + 2], ellipses[b + 3]);
          ellipseInto(ellipses[b], ellipses[b + 1], params);
        }
        return p;
      }

      function randomEllipses() {
        // Flat [cx, cy, w, h, ...] — x,y is the ellipse CENTER in rough.js.
        const e = new Float64Array(COUNT * 4);
        for (let i = 0; i < COUNT; i++) {
          const w = 20 + Math.random() * 100;
          const h = 20 + Math.random() * 100;
          const cx = 60 + Math.random() * (WIDTH - 120);
          const cy = 60 + Math.random() * (HEIGHT - 120);
          const b = i * 4;
          e[b] = cx;
          e[b + 1] = cy;
          e[b + 2] = w;
          e[b + 3] = h;
        }
        return e;
      }

      async function run() {
        await init();

        const jsTimes = [];
        const jsFlatTimes = [];
        const wasmFullTimes = [];
        const wasmViewTimes = [];
        const wasmPureTimes = [];
        let lastView = null;

        const flatBuf = new Float64Array(COUNT * MAX_OPS_PER_ELLIPSE * OP_STRIDE);
        const oFlat = {
          roughness: ROUGHNESS,
          maxRandomnessOffset: MAX_RAND,
          bowing: BOWING,
          preserveVertices: PRESERVE_VERTICES,
          disableMultiStroke: DISABLE_MULTI_STROKE,
          curveStepCount: CURVE_STEP_COUNT,
          curveFitting: CURVE_FITTING,
          curveTightness: CURVE_TIGHTNESS,
        };

        const ellipseArgs = (e) => [
          e,
          ROUGHNESS,
          MAX_RAND,
          BOWING,
          PRESERVE_VERTICES,
          DISABLE_MULTI_STROKE,
          CURVE_STEP_COUNT,
          CURVE_FITTING,
          CURVE_TIGHTNESS,
          SEED,
        ];

        for (let r = 0; r < RUNS; r++) {
          const e = randomEllipses();

          // --- JS: rough.js generation (seeded so it uses the same LCG) ---
          const opts = {
            seed: SEED,
            roughness: ROUGHNESS,
            maxRandomnessOffset: MAX_RAND,
            bowing: BOWING,
            preserveVertices: PRESERVE_VERTICES,
            disableMultiStroke: DISABLE_MULTI_STROKE,
            curveStepCount: CURVE_STEP_COUNT,
            curveFitting: CURVE_FITTING,
            curveTightness: CURVE_TIGHTNESS,
          };
          const drawables = new Array(COUNT);
          const jsStart = performance.now();
          for (let i = 0; i < COUNT; i++) {
            const b = i * 4;
            drawables[i] = rc.generator.ellipse(e[b], e[b + 1], e[b + 2], e[b + 3], opts);
          }
          jsTimes.push(performance.now() - jsStart);

          // --- JS flat buffer: same algorithm into a flat Float64Array ---
          const flatStart = performance.now();
          const written = genFlatJSEllipse(e, flatBuf, oFlat, SEED);
          jsFlatTimes.push(performance.now() - flatStart);
          if (written > flatBuf.length) {
            console.warn("flat buffer overflow:", written, ">", flatBuf.length);
          }

          // --- WASM: full generation, COPIES the op buffer out ---
          const wasmStart = performance.now();
          generate_ellipses(...ellipseArgs(e));
          wasmFullTimes.push(performance.now() - wasmStart);

          // --- WASM: pure compute (checksum, no buffer marshalled) ---
          const pureStart = performance.now();
          bench_ellipses(...ellipseArgs(e));
          wasmPureTimes.push(performance.now() - pureStart);

          // --- WASM: zero-copy view (LAST wasm call so the view stays valid to draw) ---
          const viewStart = performance.now();
          const view = generate_ellipses_view(...ellipseArgs(e));
          wasmViewTimes.push(performance.now() - viewStart);
          lastView = view;
        }

        // Draw from the Rust/WASM zero-copy view.
        drawOpBuffer(ctx, lastView);

        const js = avg(jsTimes);
        const jf = avg(jsFlatTimes);
        const wf = avg(wasmFullTimes);
        const wv = avg(wasmViewTimes);
        const wp = avg(wasmPureTimes);

        const speedup = (base, other) => (base / other).toFixed(2) + "x";

        const report = [
          `Ellipses:            ${COUNT}`,
          `Runs:                ${RUNS} (averaged)`,
          `Seed:                ${SEED} (all use Park-Miller LCG)`,
          ``,
          `JS rough.js (objs):  ${js.toFixed(2)} ms  (${(js / COUNT).toFixed(4)} ms/ellipse)`,
          `JS flat Float64Arr:  ${jf.toFixed(2)} ms  (${(jf / COUNT).toFixed(4)} ms/ellipse)  -> ${speedup(js, jf)} vs rough.js`,
          `WASM gen (copy):     ${wf.toFixed(2)} ms  (${(wf / COUNT).toFixed(4)} ms/ellipse)  -> ${speedup(js, wf)} vs rough.js`,
          `WASM gen (view):     ${wv.toFixed(2)} ms  (${(wv / COUNT).toFixed(4)} ms/ellipse)  -> ${speedup(js, wv)} vs rough.js`,
          `WASM gen (pure):     ${wp.toFixed(2)} ms  (${(wp / COUNT).toFixed(4)} ms/ellipse)  -> ${speedup(js, wp)} vs rough.js`,
          ``,
          `Honest language comparison (WASM view vs JS flat): ${speedup(jf, wv)} (same output shape).`,
          `rough.js -> JS flat gap (${speedup(js, jf)}) is object-graph/GC cost, not language.`,
          ``,
          `rough.js:  ${jsTimes.map((t) => t.toFixed(1)).join(", ")}`,
          `JS flat:   ${jsFlatTimes.map((t) => t.toFixed(1)).join(", ")}`,
          `WASM copy: ${wasmFullTimes.map((t) => t.toFixed(1)).join(", ")}`,
          `WASM view: ${wasmViewTimes.map((t) => t.toFixed(1)).join(", ")}`,
          `WASM pure: ${wasmPureTimes.map((t) => t.toFixed(1)).join(", ")}`,
        ].join("\n");

        results.textContent = report;
        console.log(report);
      }

      run().catch((e) => {
        results.textContent = "Error: " + e;
        console.error(e);
      });
    </script>
  </body>
</html>
